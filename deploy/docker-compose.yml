services:
 
  db:
    image: pgvector/pgvector:pg16
    container_name: stylora-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: stylora
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
    volumes:
      - stylora-pg-data:/var/lib/postgresql/data
    networks: [stylora-net]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stylora"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/stylora-app/stylora-backend:latest
    container_name: stylora-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      Database__Host: db
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      RAPIDAPI_KEY: ${RAPIDAPI_KEY}
      OPENWEATHER_API_KEY: ${OPENWEATHER_API_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "127.0.0.1:${BACKEND_PORT:-8080}:8080"
    networks: [stylora-net, stylora-ai-net]

  frontend:
    image: ghcr.io/stylora-app/stylora-frontend:latest
    container_name: stylora-frontend
    restart: unless-stopped
    environment:
      - VITE_BACKEND_URL=http://host.docker.internal:${BACKEND_PORT:-8080}/api
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:80"
    networks: [stylora-net]

volumes:
  stylora-pg-data:
    external: true

networks:
  stylora-net:
    external: true
  stylora-ai-net:
    external: true
