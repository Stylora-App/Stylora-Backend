openapi: 3.0.3
info:
  title: Stylora Backend API
  version: "1.0"
  description: >
    REST API for the Stylora fashion app. All endpoints except `/api/auth/register`,
    `/api/auth/login` require an authenticated session cookie.

servers:
  - url: http://localhost:8080
    description: Local / Docker

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: Stylora.Auth
      description: Cookie-based session authentication. Authenticate via POST /api/auth/login.

  schemas:
    # ── Auth ──────────────────────────────────────────────────────────────────
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email:       { type: string, format: email }
        password:    { type: string, minLength: 8 }
        firstName:   { type: string, nullable: true }
        lastName:    { type: string, nullable: true }

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:      { type: string, format: email }
        password:   { type: string }
        rememberMe: { type: boolean, default: false }

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword: { type: string }
        newPassword:     { type: string, minLength: 8 }

    UserDto:
      type: object
      properties:
        id:             { type: string, format: uuid }
        email:          { type: string, format: email }
        firstName:      { type: string, nullable: true }
        lastName:       { type: string, nullable: true }
        profilePicture: { type: string, nullable: true }
        style:          { type: string, nullable: true }
        createdAt:      { type: string, format: date-time }

    AuthResponse:
      type: object
      properties:
        success: { type: boolean }
        message: { type: string, nullable: true }
        user:
          $ref: '#/components/schemas/UserDto'
          nullable: true

    # ── User / Profile ────────────────────────────────────────────────────────
    UserProfileDto:
      type: object
      properties:
        firstName:      { type: string, nullable: true }
        lastName:       { type: string, nullable: true }
        profilePicture: { type: string, nullable: true }
        style:          { type: string, nullable: true }
        season:         { type: string, nullable: true }
        subSeason:      { type: string, nullable: true }
        palette:        { type: array, items: { type: string } }
        bestMetals:     { type: string, nullable: true }
        undertone:      { type: string, nullable: true }
        contrast:       { type: string, nullable: true }

    UpdateProfileRequest:
      type: object
      properties:
        firstName:      { type: string, nullable: true }
        lastName:       { type: string, nullable: true }
        profilePicture: { type: string, nullable: true }
        style:          { type: string, nullable: true }

    # ── Analysis ─────────────────────────────────────────────────────────────
    SeasonAnalysisRequest:
      type: object
      required: [imageBase64]
      properties:
        imageBase64:
          type: string
          description: Base64-encoded face photo (data URI or raw base64).

    SeasonAnalysisResponse:
      type: object
      required: [season, subSeason, description, recommendedColors, bestMetals]
      properties:
        id:                { type: string, nullable: true }
        season:            { type: string, example: "True Autumn" }
        subSeason:         { type: string, example: "Deep Autumn" }
        description:       { type: string }
        recommendedColors: { type: array, items: { type: string } }
        bestMetals:        { type: string }
        hairColor:         { type: string, nullable: true }
        hairDetail:        { type: string, nullable: true }
        eyeColor:          { type: string, nullable: true }
        eyeDetail:         { type: string, nullable: true }
        skinTone:          { type: string, nullable: true }
        skinDetail:        { type: string, nullable: true }
        undertone:         { type: string, nullable: true }
        contrast:          { type: string, nullable: true }

    # ── Wardrobe ──────────────────────────────────────────────────────────────
    WardrobeItemDto:
      type: object
      required: [id, image, category]
      properties:
        id:                   { type: string }
        image:                { type: string, description: Base64 image }
        category:             { type: string }
        articleTypeLabel:     { type: string, nullable: true }
        audienceTag:          { type: string, nullable: true }
        style:                { type: string, nullable: true }
        color:                { type: string, nullable: true }
        outfitRole:           { type: string, nullable: true }
        validationStatus:     { type: string, nullable: true }
        validationConfidence: { type: number, format: double, nullable: true }
        validationMessage:    { type: string, nullable: true }
        validatedAt:          { type: string, format: date-time, nullable: true }

    CreateWardrobeItemRequest:
      type: object
      required: [image]
      properties:
        image:                   { type: string, description: Base64 image }
        category:                { type: string, nullable: true }
        articleTypeLabel:        { type: string, nullable: true }
        audienceTag:             { type: string, nullable: true }
        style:                   { type: string, nullable: true }
        color:                   { type: string, nullable: true }
        overrideValidationWarning: { type: boolean, default: false }

    AnalyzeWardrobeItemRequest:
      type: object
      required: [image]
      properties:
        image: { type: string, description: Base64 image }

    DeleteWardrobeItemsRequest:
      type: object
      required: [itemIds]
      properties:
        itemIds: { type: array, items: { type: string }, minItems: 1 }

    WardrobeValidationDto:
      type: object
      required: [status, isLikelyClothing, confidence, message, canOverride, nearestLabels]
      properties:
        status:              { type: string, enum: [pass, warning, rejected] }
        isLikelyClothing:    { type: boolean }
        confidence:          { type: number, format: double }
        message:             { type: string }
        canOverride:         { type: boolean }
        nearestLabels:       { type: array, items: { type: string } }
        suggestedCategory:   { type: string, nullable: true }
        suggestedArticleType: { type: string, nullable: true }
        suggestedStyle:      { type: string, nullable: true }
        suggestedColor:      { type: string, nullable: true }
        suggestedGender:     { type: string, nullable: true }
        suggestedOutfitRole: { type: string, nullable: true }

    CreateWardrobeItemResponse:
      type: object
      properties:
        item:
          $ref: '#/components/schemas/WardrobeItemDto'
          nullable: true
        validation:
          $ref: '#/components/schemas/WardrobeValidationDto'
          nullable: true

    # ── Chat ─────────────────────────────────────────────────────────────────
    OutfitChatMessageDto:
      type: object
      required: [role, content]
      properties:
        role:    { type: string, enum: [user, assistant] }
        content: { type: string }

    OutfitChatRequest:
      type: object
      required: [messages]
      properties:
        messages:
          type: array
          items: { $ref: '#/components/schemas/OutfitChatMessageDto' }

    OutfitBoardItemDto:
      type: object
      properties:
        id:               { type: string }
        image:            { type: string }
        category:         { type: string }
        label:            { type: string }
        articleTypeLabel: { type: string, nullable: true }
        color:            { type: string, nullable: true }

    OutfitBoardDto:
      type: object
      required: [occasion, style, weatherSummary, gender, summary, palette, items]
      properties:
        occasion:       { type: string }
        style:          { type: string }
        weatherSummary: { type: string }
        gender:         { type: string, example: unisex }
        summary:        { type: string }
        palette:        { type: array, items: { type: string } }
        items:
          type: array
          items: { $ref: '#/components/schemas/OutfitBoardItemDto' }

    OutfitChatResponse:
      type: object
      required: [status, assistantMessage, missingFields, missingRoles, suggestedReplies, hasMoreOutfits]
      properties:
        status:
          type: string
          enum: [follow_up, success, not_enough_pieces, out_of_scope]
        assistantMessage: { type: string }
        missingFields:    { type: array, items: { type: string } }
        missingRoles:     { type: array, items: { type: string } }
        suggestedReplies: { type: array, items: { type: string } }
        hasMoreOutfits:   { type: boolean }
        outfit:
          $ref: '#/components/schemas/OutfitBoardDto'
          nullable: true

    # ── Explore ───────────────────────────────────────────────────────────────
    ShoppingProductDto:
      type: object
      properties:
        id:               { type: integer }
        name:             { type: string }
        brandName:        { type: string }
        price:            { type: string }
        imageUrl:         { type: string }
        url:              { type: string }
        colour:           { type: string, nullable: true }
        category:         { type: string, nullable: true }
        articleTypeLabel: { type: string, nullable: true }
        audienceTag:      { type: string, nullable: true }
        colorFamily:      { type: string, nullable: true }
        outfitRole:       { type: string, nullable: true }
        paletteMatch:     { type: boolean }

    ExploreResultDto:
      type: object
      properties:
        products:
          type: array
          items: { $ref: '#/components/schemas/ShoppingProductDto' }
        hasMore:  { type: boolean }
        page:     { type: integer }
        pageSize: { type: integer }

    # ── Try-On ────────────────────────────────────────────────────────────────
    TryOnRequest:
      type: object
      required: [personImageBase64]
      properties:
        personImageBase64:   { type: string, description: Base64-encoded person photo }
        clothingImageBase64: { type: string, nullable: true, description: Base64-encoded clothing photo }
        clothingImageUrl:    { type: string, nullable: true, description: Remote URL of clothing image }

    TryOnResponse:
      type: object
      properties:
        generatedImage: { type: string, description: Base64-encoded composite image }

    LastTryOnPhotoDto:
      type: object
      properties:
        personImageBase64: { type: string, nullable: true }

security:
  - cookieAuth: []

paths:
  # ── Auth ──────────────────────────────────────────────────────────────────
  /api/auth/register:
    $ref: './endpoints/auth.yaml#/register'
  /api/auth/login:
    $ref: './endpoints/auth.yaml#/login'
  /api/auth/logout:
    $ref: './endpoints/auth.yaml#/logout'
  /api/auth/me:
    $ref: './endpoints/auth.yaml#/me'
  /api/auth/change-password:
    $ref: './endpoints/auth.yaml#/change-password'

  # ── Users ─────────────────────────────────────────────────────────────────
  /api/users/profile:
    $ref: './endpoints/users.yaml#/profile'

  # ── Analysis ──────────────────────────────────────────────────────────────
  /api/analysis/season:
    $ref: './endpoints/analysis.yaml#/season'
  /api/analysis/latest:
    $ref: './endpoints/analysis.yaml#/latest'
  /api/analysis/save-profile:
    $ref: './endpoints/analysis.yaml#/save-profile'

  # ── Wardrobe ──────────────────────────────────────────────────────────────
  /api/wardrobe/items:
    $ref: './endpoints/wardrobe.yaml#/items'
  /api/wardrobe/items/analyze:
    $ref: './endpoints/wardrobe.yaml#/items-analyze'
  /api/wardrobe/items/{id}:
    $ref: './endpoints/wardrobe.yaml#/items-id'
  /api/wardrobe/items/delete-batch:
    $ref: './endpoints/wardrobe.yaml#/items-delete-batch'

  # ── Chat ──────────────────────────────────────────────────────────────────
  /api/chat/outfit:
    $ref: './endpoints/chat.yaml#/outfit'

  # ── Explore ───────────────────────────────────────────────────────────────
  /api/explore:
    $ref: './endpoints/explore.yaml#/search'

  # ── Try-On ────────────────────────────────────────────────────────────────
  /api/tryon/generate:
    $ref: './endpoints/tryon.yaml#/generate'
  /api/tryon/last-photo:
    $ref: './endpoints/tryon.yaml#/last-photo'
