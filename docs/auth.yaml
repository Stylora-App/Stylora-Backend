register:
  post:
    tags: [Auth]
    summary: Register a new user
    description: Creates the user account, returns a JWT access token, and sets the httpOnly refresh token cookie. No authentication required.
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/RegisterRequest'
    responses:
      '200':
        description: Registration successful
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '400':
        description: Validation error (missing fields or weak password)
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'

login:
  post:
    tags: [Auth]
    summary: Log in with email and password
    description: Validates credentials, returns a JWT access token, and sets the httpOnly refresh token cookie.
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/LoginRequest'
    responses:
      '200':
        description: Login successful
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '400':
        description: Missing email or password
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '401':
        description: Invalid credentials
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'

google:
  post:
    tags: [Auth]
    summary: Sign in or register with Google
    description: Verifies a Google ID token from GIS, finds or creates the user, returns a JWT access token, and sets the httpOnly refresh token cookie. No authentication required.
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/GoogleAuthRequest'
    responses:
      '200':
        description: Authentication successful
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '401':
        description: Invalid Google credential
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'

refresh:
  post:
    tags: [Auth]
    summary: Issue a new access token using the refresh token cookie
    description: Reads the httpOnly refresh cookie, validates and rotates it, returns a new JWT access token. No Authorization header needed.
    security: []
    responses:
      '200':
        description: New access token issued
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '401':
        description: Refresh token missing, invalid, or expired
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'

logout:
  post:
    tags: [Auth]
    summary: Log out and revoke the refresh token cookie
    responses:
      '200':
        description: Logout successful
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'

me:
  get:
    tags: [Auth]
    summary: Get the currently authenticated user
    responses:
      '200':
        description: Authenticated user
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '401':
        description: Not authenticated
      '404':
        description: User not found
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'

change-password:
  post:
    tags: [Auth]
    summary: Change the authenticated user's password
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/ChangePasswordRequest'
    responses:
      '200':
        description: Password changed successfully
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '400':
        description: Weak new password or incorrect current password
        content:
          application/json:
            schema:
              $ref: '../openapi.yaml#/components/schemas/AuthResponse'
      '401':
        description: Not authenticated
