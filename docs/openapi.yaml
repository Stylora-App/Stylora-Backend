openapi: 3.0.3
info:
  title: Stylora Backend API
  version: '1.0'
  description: |
    REST API for the Stylora fashion app. All endpoints except `/api/auth/register`, `/api/auth/login` require an authenticated session cookie.
servers:
  - url: 'http://localhost:8080'
    description: Local / Docker
components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: Stylora.Auth
      description: Cookie-based session authentication. Authenticate via POST /api/auth/login.
  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        rememberMe:
          type: boolean
          default: false
    ChangePasswordRequest:
      type: object
      required:
        - currentPassword
        - newPassword
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
          minLength: 8
    UserDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profilePicture:
          type: string
          nullable: true
        style:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
    AuthResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
          nullable: true
        user:
          $ref: '#/components/schemas/UserDto'
          nullable: true
    UserProfileDto:
      type: object
      properties:
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profilePicture:
          type: string
          nullable: true
        style:
          type: string
          nullable: true
        season:
          type: string
          nullable: true
        subSeason:
          type: string
          nullable: true
        palette:
          type: array
          items:
            type: string
        bestMetals:
          type: string
          nullable: true
        undertone:
          type: string
          nullable: true
        contrast:
          type: string
          nullable: true
    UpdateProfileRequest:
      type: object
      properties:
        firstName:
          type: string
          nullable: true
        lastName:
          type: string
          nullable: true
        profilePicture:
          type: string
          nullable: true
        style:
          type: string
          nullable: true
    SeasonAnalysisRequest:
      type: object
      required:
        - imageBase64
      properties:
        imageBase64:
          type: string
          description: Base64-encoded face photo (data URI or raw base64).
    SeasonAnalysisResponse:
      type: object
      required:
        - season
        - subSeason
        - description
        - recommendedColors
        - bestMetals
      properties:
        id:
          type: string
          nullable: true
        season:
          type: string
          example: True Autumn
        subSeason:
          type: string
          example: Deep Autumn
        description:
          type: string
        recommendedColors:
          type: array
          items:
            type: string
        bestMetals:
          type: string
        hairColor:
          type: string
          nullable: true
        hairDetail:
          type: string
          nullable: true
        eyeColor:
          type: string
          nullable: true
        eyeDetail:
          type: string
          nullable: true
        skinTone:
          type: string
          nullable: true
        skinDetail:
          type: string
          nullable: true
        undertone:
          type: string
          nullable: true
        contrast:
          type: string
          nullable: true
    WardrobeItemDto:
      type: object
      required:
        - id
        - image
        - category
      properties:
        id:
          type: string
        image:
          type: string
          description: Base64 image
        category:
          type: string
        articleTypeLabel:
          type: string
          nullable: true
        audienceTag:
          type: string
          nullable: true
        style:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        outfitRole:
          type: string
          nullable: true
        validationStatus:
          type: string
          nullable: true
        validationConfidence:
          type: number
          format: double
          nullable: true
        validationMessage:
          type: string
          nullable: true
        validatedAt:
          type: string
          format: date-time
          nullable: true
    CreateWardrobeItemRequest:
      type: object
      required:
        - image
      properties:
        image:
          type: string
          description: Base64 image
        category:
          type: string
          nullable: true
        articleTypeLabel:
          type: string
          nullable: true
        audienceTag:
          type: string
          nullable: true
        style:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
        overrideValidationWarning:
          type: boolean
          default: false
    AnalyzeWardrobeItemRequest:
      type: object
      required:
        - image
      properties:
        image:
          type: string
          description: Base64 image
    DeleteWardrobeItemsRequest:
      type: object
      required:
        - itemIds
      properties:
        itemIds:
          type: array
          items:
            type: string
          minItems: 1
    WardrobeValidationDto:
      type: object
      required:
        - status
        - isLikelyClothing
        - confidence
        - message
        - canOverride
        - nearestLabels
      properties:
        status:
          type: string
          enum:
            - pass
            - warning
            - rejected
        isLikelyClothing:
          type: boolean
        confidence:
          type: number
          format: double
        message:
          type: string
        canOverride:
          type: boolean
        nearestLabels:
          type: array
          items:
            type: string
        suggestedCategory:
          type: string
          nullable: true
        suggestedArticleType:
          type: string
          nullable: true
        suggestedStyle:
          type: string
          nullable: true
        suggestedColor:
          type: string
          nullable: true
        suggestedGender:
          type: string
          nullable: true
        suggestedOutfitRole:
          type: string
          nullable: true
    CreateWardrobeItemResponse:
      type: object
      properties:
        item:
          $ref: '#/components/schemas/WardrobeItemDto'
          nullable: true
        validation:
          $ref: '#/components/schemas/WardrobeValidationDto'
          nullable: true
    OutfitChatMessageDto:
      type: object
      required:
        - role
        - content
      properties:
        role:
          type: string
          enum:
            - user
            - assistant
        content:
          type: string
    OutfitChatRequest:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/OutfitChatMessageDto'
    OutfitBoardItemDto:
      type: object
      properties:
        id:
          type: string
        image:
          type: string
        category:
          type: string
        label:
          type: string
        articleTypeLabel:
          type: string
          nullable: true
        color:
          type: string
          nullable: true
    OutfitBoardDto:
      type: object
      required:
        - occasion
        - style
        - weatherSummary
        - gender
        - summary
        - palette
        - items
      properties:
        occasion:
          type: string
        style:
          type: string
        weatherSummary:
          type: string
        gender:
          type: string
          example: unisex
        summary:
          type: string
        palette:
          type: array
          items:
            type: string
        items:
          type: array
          items:
            $ref: '#/components/schemas/OutfitBoardItemDto'
    OutfitChatResponse:
      type: object
      required:
        - status
        - assistantMessage
        - missingFields
        - missingRoles
        - suggestedReplies
        - hasMoreOutfits
      properties:
        status:
          type: string
          enum:
            - follow_up
            - success
            - not_enough_pieces
            - out_of_scope
        assistantMessage:
          type: string
        missingFields:
          type: array
          items:
            type: string
        missingRoles:
          type: array
          items:
            type: string
        suggestedReplies:
          type: array
          items:
            type: string
        hasMoreOutfits:
          type: boolean
        outfit:
          $ref: '#/components/schemas/OutfitBoardDto'
          nullable: true
    ShoppingProductDto:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        brandName:
          type: string
        price:
          type: string
        imageUrl:
          type: string
        url:
          type: string
        colour:
          type: string
          nullable: true
        category:
          type: string
          nullable: true
        articleTypeLabel:
          type: string
          nullable: true
        audienceTag:
          type: string
          nullable: true
        colorFamily:
          type: string
          nullable: true
        outfitRole:
          type: string
          nullable: true
        paletteMatch:
          type: boolean
    ExploreResultDto:
      type: object
      properties:
        products:
          type: array
          items:
            $ref: '#/components/schemas/ShoppingProductDto'
        hasMore:
          type: boolean
        page:
          type: integer
        pageSize:
          type: integer
    TryOnRequest:
      type: object
      required:
        - personImageBase64
      properties:
        personImageBase64:
          type: string
          description: Base64-encoded person photo
        clothingImageBase64:
          type: string
          nullable: true
          description: Base64-encoded clothing photo
        clothingImageUrl:
          type: string
          nullable: true
          description: Remote URL of clothing image
    TryOnResponse:
      type: object
      properties:
        generatedImage:
          type: string
          description: Base64-encoded composite image
    LastTryOnPhotoDto:
      type: object
      properties:
        personImageBase64:
          type: string
          nullable: true
security:
  - cookieAuth: []
paths:
  /api/auth/register:
    post:
      operationId: register
      tags:
        - Auth
      summary: Register a new user
      description: Creates the user account and sets the session cookie. No authentication required.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Validation error (missing fields or weak password)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /api/auth/login:
    post:
      operationId: login
      tags:
        - Auth
      summary: Log in with email and password
      description: Validates credentials and sets the session cookie on success.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Missing email or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /api/auth/logout:
    post:
      operationId: logout
      tags:
        - Auth
      summary: Log out and clear the session cookie
      responses:
        '200':
          description: Logout successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Not authenticated
  /api/auth/me:
    get:
      operationId: getMe
      tags:
        - Auth
      summary: Get the currently authenticated user
      responses:
        '200':
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Not authenticated
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
  /api/auth/change-password:
    post:
      operationId: changePassword
      tags:
        - Auth
      summary: Change the authenticated user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChangePasswordRequest'
      responses:
        '200':
          description: Password changed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Weak new password or incorrect current password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Not authenticated
  /api/users/profile:
    get:
      operationId: getProfile
      tags:
        - Users
      summary: Get the authenticated user's profile
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDto'
        '401':
          description: Not authenticated
    put:
      operationId: updateProfile
      tags:
        - Users
      summary: Update the authenticated user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDto'
        '400':
          description: Invalid request
        '401':
          description: Not authenticated
  /api/analysis/season:
    post:
      operationId: analyzeSeason
      tags:
        - Analysis
      summary: Analyse a face photo to determine colour season
      description: |
        Calls Google Gemini Vision to classify the user's season, palette, undertone, and contrast. Result is saved to the user's analysis history.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeasonAnalysisRequest'
      responses:
        '200':
          description: Season analysis result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonAnalysisResponse'
        '401':
          description: Not authenticated
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '502':
          description: Gemini Vision upstream error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
  /api/analysis/latest:
    get:
      operationId: getLatestAnalysis
      tags:
        - Analysis
      summary: Get the user's most recent season analysis result
      description: Returns null if the user has not completed an analysis yet.
      responses:
        '200':
          description: Latest analysis result (null if none)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SeasonAnalysisResponse'
                nullable: true
        '400':
          description: Error retrieving analysis
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '401':
          description: Not authenticated
  /api/analysis/save-profile:
    post:
      operationId: saveSeasonProfile
      tags:
        - Analysis
      summary: Save a season analysis result to the user's profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SeasonAnalysisResponse'
      responses:
        '200':
          description: Updated user profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDto'
        '400':
          description: Invalid analysis data
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '401':
          description: Not authenticated
  /api/wardrobe/items:
    get:
      operationId: getItems
      tags:
        - Wardrobe
      summary: List all wardrobe items for the authenticated user
      responses:
        '200':
          description: Array of wardrobe items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/WardrobeItemDto'
        '401':
          description: Not authenticated
    post:
      operationId: addItem
      tags:
        - Wardrobe
      summary: Add a new wardrobe item
      description: |
        Runs CLIP validation before saving. Returns 409 when the image fails the clothing check — set `overrideValidationWarning: true` in the request body to force-add anyway.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWardrobeItemRequest'
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateWardrobeItemResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Not authenticated
        '409':
          description: Image failed clothing validation (override available)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WardrobeValidationDto'
  /api/wardrobe/items/analyze:
    post:
      operationId: analyzeItem
      tags:
        - Wardrobe
      summary: Validate a clothing image without saving it
      description: |
        Runs the CLIP embedding worker to classify the image and return confidence, suggested labels, and category.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AnalyzeWardrobeItemRequest'
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WardrobeValidationDto'
        '400':
          description: Invalid image
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Not authenticated
  '/api/wardrobe/items/{id}':
    delete:
      operationId: deleteItem
      tags:
        - Wardrobe
      summary: Delete a single wardrobe item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The wardrobe item ID to delete
      responses:
        '204':
          description: Item deleted
        '401':
          description: Not authenticated
        '404':
          description: Item not found
  /api/wardrobe/items/delete-batch:
    post:
      operationId: deleteItems
      tags:
        - Wardrobe
      summary: Delete multiple wardrobe items in one request
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteWardrobeItemsRequest'
      responses:
        '200':
          description: Number of items deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  deletedCount:
                    type: integer
        '400':
          description: No item IDs provided
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
        '401':
          description: Not authenticated
  /api/chat/outfit:
    post:
      operationId: generateOutfit
      tags:
        - Chat
      summary: Generate an outfit suggestion from conversation history
      description: |
        Passes the full message history to the Gemma intent worker which extracts occasion, style, weather, and gender. The backend then assembles an outfit from the user's wardrobe items. Returns either a follow-up question or a complete outfit board.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OutfitChatRequest'
      responses:
        '200':
          description: Outfit suggestion or follow-up question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OutfitChatResponse'
        '401':
          description: Not authenticated
  /api/explore:
    get:
      operationId: search
      tags:
        - Explore
      summary: Search ASOS products filtered by the user's colour palette
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Free-text search query. Falls back to season-based terms when omitted.
        - name: category
          in: query
          required: false
          schema:
            type: string
            enum:
              - all
              - tops
              - bottoms
              - dresses
              - shoes
              - accessories
              - outerwear
            default: all
        - name: gender
          in: query
          required: false
          schema:
            type: string
            enum:
              - women
              - men
        - name: season
          in: query
          required: false
          schema:
            type: string
          description: User's season (e.g. "True Autumn") used to build the default query.
        - name: subSeason
          in: query
          required: false
          schema:
            type: string
          description: User's sub-season (e.g. "Deep Autumn") used to resolve the canonical palette vector.
        - name: palette
          in: query
          required: false
          schema:
            type: string
          description: 'Comma-separated hex colour codes from the user''s palette (e.g. "#FF5733,#C19A6B").'
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 1
          description: 1-based page number.
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 48
            default: 20
          description: Items per page (1–48).
      responses:
        '200':
          description: Paginated product results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExploreResultDto'
        '401':
          description: Not authenticated
        '502':
          description: ASOS upstream error
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
  /api/tryon/generate:
    post:
      operationId: generateTryOn
      tags:
        - TryOn
      summary: Generate a virtual try-on image
      description: |
        Sends the person photo and clothing image (or URL) to Google Gemini to produce a composite try-on image. The person photo is saved for reuse via GET /api/tryon/last-photo. At least one of `clothingImageBase64` or `clothingImageUrl` must be provided.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TryOnRequest'
      responses:
        '200':
          description: Generated try-on image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TryOnResponse'
        '400':
          description: Invalid request or generation failure
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        '401':
          description: Not authenticated
  /api/tryon/last-photo:
    get:
      operationId: getLastPhoto
      tags:
        - TryOn
      summary: Get the last person photo used by the authenticated user
      responses:
        '200':
          description: Last saved person photo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LastTryOnPhotoDto'
        '401':
          description: Not authenticated
        '404':
          description: No previous photo found
